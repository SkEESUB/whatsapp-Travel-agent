worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    # ============================================
    # Basic Settings
    # ============================================
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;
    
    # ============================================
    # Logging
    # ============================================
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    access_log /var/log/nginx/access.log main;
    
    # ============================================
    # Rate Limiting
    # ============================================
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=100r/m;
    limit_req_status 429;
    
    # ============================================
    # Gzip Compression
    # ============================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    
    # ============================================
    # Upstream (Load Balancing)
    # ============================================
    upstream travelbot_backend {
        least_conn;  # Load balance algorithm: least connections
        
        # 3 app instances
        server app:3000 weight=1 max_fails=3 fail_timeout=30s;
        server app:3001 weight=1 max_fails=3 fail_timeout=30s;
        server app:3002 weight=1 max_fails=3 fail_timeout=30s;
        
        keepalive 32;
    }
    
    # ============================================
    # HTTP Server
    # ============================================
    server {
        listen 80;
        server_name your-domain.com;  # Replace with your domain
        
        # Redirect to HTTPS (uncomment in production)
        # return 301 https://$server_name$request_uri;
        
        # ============================================
        # WhatsApp Webhook
        # ============================================
        location /api/webhook {
            limit_req zone=webhook_limit burst=20 nodelay;
            
            proxy_pass http://travelbot_backend;
            proxy_http_version 1.1;
            
            # Proxy Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }
        
        # ============================================
        # Admin API
        # ============================================
        location /admin/ {
            limit_req zone=api_limit burst=10 nodelay;
            
            proxy_pass http://travelbot_backend;
            proxy_http_version 1.1;
            
            # Proxy Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # ============================================
        # API Routes
        # ============================================
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            
            proxy_pass http://travelbot_backend;
            proxy_http_version 1.1;
            
            # Proxy Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
        
        # ============================================
        # Health Check (no rate limit)
        # ============================================
        location /api/health {
            proxy_pass http://travelbot_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
        
        # ============================================
        # WebSocket Support (for future)
        # ============================================
        location /ws {
            proxy_pass http://travelbot_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400s;
        }
        
        # ============================================
        # Static Files (if needed)
        # ============================================
        location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
        
        # ============================================
        # Deny access to hidden files
        # ============================================
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
    
    # ============================================
    # HTTPS Server (SSL Termination)
    # ============================================
    # Uncomment and configure for production
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     # SSL Certificate
    #     ssl_certificate /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #
    #     # SSL Configuration
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #
    #     # HSTS
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #
    #     # Same proxy settings as HTTP server
    #     location /api/webhook {
    #         limit_req zone=webhook_limit burst=20 nodelay;
    #         proxy_pass http://travelbot_backend;
    #         # ... (same as above)
    #     }
    #
    #     location /admin/ {
    #         limit_req zone=api_limit burst=10 nodelay;
    #         proxy_pass http://travelbot_backend;
    #         # ... (same as above)
    #     }
    #
    #     location /api/ {
    #         limit_req zone=api_limit burst=20 nodelay;
    #         proxy_pass http://travelbot_backend;
    #         # ... (same as above)
    #     }
    #
    #     location /api/health {
    #         proxy_pass http://travelbot_backend;
    #     }
    # }
}
